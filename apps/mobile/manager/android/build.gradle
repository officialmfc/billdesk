// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  ext {
    // Add the specific NDK version you manually installed
    ndkVersion = "29.0.14206865"
    buildToolsVersion = "36.0.0"
        compileSdkVersion = 36
        targetSdkVersion = 36
  }
  repositories {

    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

subprojects { subproject ->
  afterEvaluate {
    def androidExtension = subproject.extensions.findByName("android")
    if (androidExtension != null && androidExtension.hasProperty("ndkVersion")) {
      androidExtension.ndkVersion = rootProject.ext.ndkVersion
    }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
